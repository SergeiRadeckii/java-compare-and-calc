name: Run Java Application

on:
  push:
    branches: [ comparisonString ]   # или main, если хотите на другой ветке
  pull_request:
    branches: [ comparisonString ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile
        run: javac src/ComparisonString.java

      - name: Run
        run: java -cp src ComparisonString